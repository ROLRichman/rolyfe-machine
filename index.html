<h2>🔥 RO’Lyfe Deal OS — FINAL (ALL SYSTEMS)</h2>
<div class="grid" id="grid"></div>

<script>
const EMAIL="richman@rootoflyfe.com";
const PHONE="2674326734";

let leads=[
{address:"2109 W Nedro Ave Philadelphia PA",arv:220000,repairs:40000,price:120000,status:"lead"}
];

// -------- CALC --------
function calc(d){
let arv=+d.arv||0;
let price=+d.price||0;
let repairs=+d.repairs||0;

return{
cash:arv*0.5,
creative:arv*0.75,
sellerFinance:arv*0.8,
profit:(arv*0.7)-price-repairs
};
}

// -------- AUTO COMP --------
function autoComp(i){
let avg=leads.reduce((a,b)=>a+(+b.arv||0),0)/leads.length;
leads[i].arv=Math.round(avg);
render();
}

// -------- EMAIL --------
function sendEmail(d){
let c=calc(d);

let body=`PURCHASE & SALE AGREEMENT

Property: ${d.address}
Seller:
Buyer: Richardson L. and/or Assigns

Purchase Price: $${Math.round(c.cash)}
Earnest Money Deposit: $500 (to be held by title company)
Inspection Period: 14 days
Closing: 30 days or sooner
Condition: Property sold AS-IS

Assignment Clause: Buyer may assign or transfer interest in this agreement without further consent of Seller.
Additional Clause: Buyer may coordinate with funding partners, contractors, and affiliates as needed to complete the transaction.

--------------------------------------
SIGNATURES

BUYER: Richardson L. and/or Assigns
Signature: ____
Date: __________

SELLER:
Signature: __________`;

window.location.href=`mailto:${EMAIL}?subject=Offer ${d.address}&body=${encodeURIComponent(body)}`;
}

// -------- ASSIGN --------
function assign(d){
let body=`ASSIGNMENT AGREEMENT

Property: ${d.address}

Assignor: Richardson L
Assignee: __________________

Assignment Fee: $__________

All rights transferred.`;

window.location.href=`mailto:${EMAIL}?subject=Assignment ${d.address}&body=${encodeURIComponent(body)}`;
}

// -------- SMS --------
function sms(d){
let c=calc(d);
window.location.href=`sms:${PHONE}?body=${encodeURIComponent(
`Property: ${d.address}
Cash Offer: $${Math.round(c.cash)}
Reply YES to proceed`
)}`;
}

// -------- RENDER --------
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

leads.forEach((d,i)=>{
let c=calc(d);

let div=document.createElement("div");
div.className="card";

div.innerHTML=`

<div class="card-header">${d.address}</div>

Status:
<select onchange="leads[${i}].status=this.value;render();">
<option ${d.status==="lead"?"selected":""}>lead</option>
<option ${d.status==="offer sent"?"selected":""}>offer sent</option>
<option ${d.status==="negotiating"?"selected":""}>negotiating</option>
<option ${d.status==="signed"?"selected":""}>signed</option>
<option ${d.status==="sold"?"selected":""}>sold</option>
</select>

ARV:
<input value="${d.arv}" onchange="leads[${i}].arv=this.value;render();">

Purchase Price:
<input value="${d.price}" onchange="leads[${i}].price=this.value;render();">

Repairs:
<input value="${d.repairs}" onchange="leads[${i}].repairs=this.value;render();">

<div class="btn" onclick="autoComp(${i})">📊 Auto Comp</div>

<div class="offerbox">
<b>Offers</b><br><br>
Cash: $${Math.round(c.cash)}<br>
Creative: $${Math.round(c.creative)}<br>
Seller Finance: $${Math.round(c.sellerFinance)}<br><br>
<b>Profit: $${Math.round(c.profit)}</b>
</div>

<div class="btn" onclick='sms(leads[${i}])'>📱 SMS</div>
<div class="btn" onclick='sendEmail(leads[${i}])'>📧 Email</div>
<div class="btn" onclick='assign(leads[${i}])'>📑 Assign</div>

`;

grid.appendChild(div);
});
}

render();
</script>
