<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO’Lyfe Deal OS — CLOSER MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0b0f1a;color:#fff;font-family:Arial;margin:0;padding:10px;}
.grid{display:grid;grid-template-columns:1fr;gap:10px;}
.card{background:#141a2a;padding:12px;border-radius:10px;touch-action:pan-y;}
.card-header{display:flex;justify-content:space-between;cursor:pointer}
.hidden{display:none;}
input{width:100%;padding:8px;background:#1a1f2a;border:1px solid #333;color:#fff;}
.btn{background:#2e3c66;padding:10px;margin:4px 0;border-radius:6px;text-align:center;font-weight:bold;}
a{color:#7fd1ff;display:block;margin:2px 0;text-decoration:none;}
</style>
</head>

<body>

<h2>🔥 RO’Lyfe Deal OS — CLOSER MODE</h2>

<select id="strategy">
<option>Wholesale</option>
<option>Fix & Flip</option>
<option>Rental</option>
<option>Bridge</option>
</select>

<input type="file" id="csvFile" class="btn">
<div class="btn" onclick="bulkSMS()">📲 Bulk SMS</div>

<div class="grid" id="grid"></div>

<script>
const EMAIL="richman@rootoflyfe.com";
const PHONE="2674326734";

// ------------------- Leads -------------------
let leads = JSON.parse(localStorage.getItem("leads")) || [
{address:"857 E Stafford St Philadelphia PA",arv:300000,repairs:70000,status:"new"}
];

while(leads.length<125){
let base=leads[leads.length%1];
leads.push({
address:base.address+" #"+leads.length,
arv:base.arv+Math.round(Math.random()*20000-10000),
repairs:base.repairs,
status:"new"
});
}

// ------------------- Calc -------------------
function calc(d){
let arv=parseFloat(d.arv)||0;
return{
cash:arv*0.5,
carry:arv*0.65,
creative:arv*0.75,
sellerFinance:arv*0.8
};
}

// ------------------- Actions -------------------
function sendEmail(d){
let c=calc(d);

let body=`PURCHASE OFFER

Property: ${d.address}

Buyer: Richardson L. and/or Assigns

Offer Price: $${Math.round(c.cash)}

Terms:
- Cash purchase
- Close within 14–30 days
- Property sold AS-IS
- Buyer may assign contract

We are prepared to move quickly.

Richardson L
RO’Lyfe Holdings
${EMAIL}`;

window.location.href=`mailto:${EMAIL}?subject=Offer ${d.address}&body=${encodeURIComponent(body)}`;
}

function sendSMS(d){
let c=calc(d);
let msg=`Hi, this is Richardson.

Property: ${d.address}

Cash Offer: $${Math.round(c.cash)}

We buy as-is and close fast.`;

window.location.href=`sms:${PHONE}?body=${encodeURIComponent(msg)}`;
}

function bulkSMS(){ leads.slice(0,10).forEach(l=>sendSMS(l)); }

function sellerContract(d){
let c=calc(d);
let win=window.open("","_blank");

win.document.write(`
<h2>PURCHASE & SALE AGREEMENT</h2>
Property: ${d.address}<br>
Seller: ____________________<br>
Buyer: Richardson L. and/or Assigns<br><br>

Purchase Price: $${Math.round(c.cash)}<br>
EMD: $500<br>
Inspection: 14 days<br>
Closing: 30 days<br>
AS-IS Condition<br>
Assignment Allowed<br>

<hr>

BUYER SIGN: _____________<br>
SELLER SIGN: _____________
`);
}

// ------------------- Render -------------------
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

leads.forEach((d,i)=>{
let c=calc(d);

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="card-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
<b>${d.address}</b> <span>${d.status}</span>
</div>

<div class="hidden">

ARV: <input value="${d.arv}" onchange="leads[${i}].arv=this.value">

<br><b>Offer Breakdown</b><br>
Cash: $${Math.round(c.cash)}<br>
Seller Carry: $${Math.round(c.carry)}<br>
Creative: $${Math.round(c.creative)}<br>
Seller Finance: $${Math.round(c.sellerFinance)}<br>

<div class="btn" onclick='sendEmail(${JSON.stringify(d)})'>📧 Send Offer</div>
<div class="btn" onclick='sendSMS(${JSON.stringify(d)})'>📱 SMS</div>
<div class="btn" onclick='sellerContract(${JSON.stringify(d)})'>✍️ Contract</div>

<br><b>Property Intel</b>
<a href="https://property.phila.gov" target="_blank">Phila Property Search</a>
<a href="https://opainquiry.phila.gov" target="_blank">OPA</a>
<a href="https://www.phila.gov/services/property-lots-housing/find-property-information" target="_blank">CityAtlas</a>
<a href="https://pennsylvania.propertychecker.com" target="_blank">PropertyChecker</a>
<a href="https://www.propertyreach.com" target="_blank">PropertyReach</a>

<br><b>Rural Tools</b>
<a href="https://www.consumerfinance.gov/rural-or-underserved-tool/" target="_blank">CFPB Rural Tool</a>
<a href="https://eligibility.sc.egov.usda.gov/eligibility/welcomeAction.do?pageAction=sfp" target="_blank">USDA Eligibility</a>

<br><b>Deal Links</b>
<a href="https://www.zillow.com/homes/${d.address.replaceAll(" ","-")}" target="_blank">Zillow</a>
<a href="https://www.redfin.com/search?q=${d.address.replaceAll(" ","%20")}" target="_blank">Redfin</a>

</div>
`;

grid.appendChild(div);
});
}

render();
</script>

</body>
</html>
