<style>
body{background:#0b0f1a;color:#fff;font-family:Arial;margin:0;padding:10px;}
h2{text-align:center;}
.grid{display:grid;gap:12px;}
.card{background:#141a2a;padding:12px;border-radius:10px;}
.card-header{display:flex;justify-content:space-between;cursor:pointer;font-weight:bold;}
.hidden{display:none;}
input,select{width:100%;padding:8px;margin:5px 0;background:#1a1f2a;border:1px solid #333;color:#fff;}
.btn{background:#2e3c66;padding:10px;margin:5px 0;border-radius:6px;text-align:center;font-weight:bold;cursor:pointer;}
.score{background:#1f2a44;padding:10px;border-radius:8px;margin-bottom:10px;text-align:center;}
a{color:#7fd1ff;display:block;margin:2px 0;text-decoration:none;}
</style>

<h2>🔥 RO’Lyfe Deal OS — GitHub SaaS</h2>
<div class="score" id="scoreboard"></div>
<div class="grid" id="grid"></div>

<script>
const EMAIL="richman@rootoflyfe.com";
const PHONE="2674326734";

// ------------------- LEADS -------------------
// 125+ unique leads (replace placeholders with real addresses)
let defaultLeads=[
{address:"857 E Stafford St Philadelphia PA",arv:300000,repairs:70000,status:"lead",price:150000},
{address:"2109 W Nedro Ave Philadelphia PA",arv:350000,repairs:50000,status:"offer sent",price:229169},
{address:"742 W Somerset St Philadelphia PA",arv:220000,repairs:40000,status:"negotiating",price:120000},
// ... Add up to 125 unique leads below, replacing duplicates
// Example placeholders
{address:"1000 Placeholder St City PA",arv:180000,repairs:30000,status:"lead",price:100000},
{address:"1001 Placeholder St City PA",arv:200000,repairs:40000,status:"lead",price:120000},
{address:"1002 Placeholder St City PA",arv:250000,repairs:50000,status:"lead",price:150000},
// Add remaining to reach 125
];

// Load from localStorage or fallback
let leads;
try{leads=JSON.parse(localStorage.getItem("leads"));}catch(e){leads=null;}
if(!leads || leads.length<125){
  leads=defaultLeads;
  try{localStorage.setItem("leads",JSON.stringify(leads));}catch(e){}
}

function save(){try{localStorage.setItem("leads",JSON.stringify(leads));}catch(e){}}

// ------------------- CALC -------------------
function calc(d){
let arv=parseFloat(d.arv)||0;
let price=parseFloat(d.price)||0;
let repairs=parseFloat(d.repairs)||0;
return{
cash:arv*0.5,
carry:arv*0.65,
creative:arv*0.75,
sellerFinance:arv*0.8,
profit:(arv*0.7)-price-repairs
};
}

// ------------------- STATUS -------------------
function statusColor(s){
return{"lead":"#888","offer sent":"#3498db","negotiating":"#f1c40f","signed":"#2ecc71","sold":"#27ae60"}[s]||"#fff";
}

// ------------------- SCOREBOARD -------------------
function updateScore(){
let total=0;
let deals=0;
leads.forEach(d=>{
let p=calc(d).profit;
if(d.status==="sold"){total+=p;deals++;}
});
document.getElementById("scoreboard").innerHTML=`💰 Closed Deals: ${deals} | Profit: $${Math.round(total)}`;
}

// ------------------- ACTIONS -------------------
function sendSMS(d){
let c=calc(d);
window.location.href=`sms:${PHONE}?body=${encodeURIComponent(
`Property: ${d.address}\nOffer: $${Math.round(c.cash)}\nReply YES to proceed.`
)}`;
d.status="offer sent"; save(); render();
}

function sendEmail(d){
let c=calc(d);
window.location.href=`mailto:${EMAIL}?subject=Offer ${d.address}&body=${encodeURIComponent(
`Offer: $${Math.round(c.cash)}\nProperty: ${d.address}`
)}`;
}

// ------------------- PDF -------------------
function pdf(title,text){
let w=window.open("","_blank");
w.document.write(`<pre style="padding:40px;font-family:Arial">${title}\n\n${text}</pre>`);
setTimeout(()=>{w.print();},500);
}

function contract(d){
let c=calc(d);
pdf("PURCHASE AGREEMENT",
`Property: ${d.address}
Price: $${Math.round(c.cash)}
AS-IS | Assignable

Buyer: Richardson L
Seller: __________`);
d.status="signed"; save(); render();
}

function assign(d){
pdf("ASSIGNMENT",
`Property: ${d.address}
Assignor: Richardson L
Assignee: _________`);
}

// ------------------- QUICK CLOSE -------------------
function quickClose(d){sendSMS(d); setTimeout(()=>contract(d),1200);}

// ------------------- AUTO COMP -------------------
function autoComp(d){
let avg=leads.reduce((a,b)=>a+(+b.arv||0),0)/leads.length;
d.arv=Math.round(avg); save(); render();
}

// ------------------- ANALYZER INTEGRATION -------------------
function fillAnalyzer(d){
let elAddr=document.getElementById("propAddress");
let elArv=document.getElementById("arv");
let elPrice=document.getElementById("purchasePrice");
let elRehab=document.getElementById("rehabCost");

if(elAddr) elAddr.value=d.address;
if(elArv) elArv.value=d.arv;
if(elPrice) elPrice.value=d.price||0;
if(elRehab) elRehab.value=d.repairs||0;

window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

// ------------------- RENDER -------------------
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";
leads.forEach((d,i)=>{
let c=calc(d);
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="card-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
${d.address}
<span style="color:${statusColor(d.status)}">${d.status}</span>
</div>

<div class="hidden">
Status:
<select onchange="leads[${i}].status=this.value;save();render();">
<option ${d.status==="lead"?"selected":""}>lead</option>
<option ${d.status==="offer sent"?"selected":""}>offer sent</option>
<option ${d.status==="negotiating"?"selected":""}>negotiating</option>
<option ${d.status==="signed"?"selected":""}>signed</option>
<option ${d.status==="sold"?"selected":""}>sold</option>
</select>

ARV:
<input value="${d.arv}" onchange="leads[${i}].arv=this.value;save();render();">

<div class="btn" onclick='autoComp(leads[${i}])'>📊 Auto Comp</div>

<b>Offers</b><br>
Cash: $${Math.round(c.cash)}<br>
Creative: $${Math.round(c.creative)}<br>
Seller Finance: $${Math.round(c.sellerFinance)}<br>

<b>Profit:</b> $${Math.round(c.profit)}

<div class="btn" onclick='sendSMS(${JSON.stringify(d)})'>📱 SMS</div>
<div class="btn" onclick='sendEmail(${JSON.stringify(d)})'>📧 Email</div>
<div class="btn" onclick='contract(${JSON.stringify(d)})'>📄 Contract</div>
<div class="btn" onclick='assign(${JSON.stringify(d)})'>📑 Assign</div>
<div class="btn" onclick='quickClose(${JSON.stringify(d)})'>⚡ Close</div>
<div class="btn" onclick='fillAnalyzer(${JSON.stringify(d)})'>📥 Analyzer</div>

<a href="https://www.self.inc/" target="_blank">Self Loan</a>
</div>
`;

grid.appendChild(div);
});

updateScore();
}

render();
</script>
