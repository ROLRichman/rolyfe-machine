<html>  
<head>  
<meta charset="UTF-8">  <style>  
body{background:#0b0f1a;color:#fff;font-family:Arial;padding:10px}  
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:10px}  
.card{background:#141a2a;padding:12px;border-radius:10px}  
.btn{background:#1f2a44;padding:7px;margin:4px;display:inline-block;cursor:pointer;border-radius:6px}  
.btn:hover{background:#2e3c66}  
.hidden{display:none}  
input{width:100%;padding:6px;margin-top:5px;background:#0b0f1a;color:#fff;border:1px solid #333}  
textarea{width:100%;background:#0b0f1a;color:#fff}  
</style>  </head>  <body>  <h2>🔥 RO’Lyfe Deal OS — CLOSER MODE</h2>  <input type="file" id="csvFile" class="btn">  <div class="btn" onclick="bulkSMS()">📲 Bulk SMS</div>  <div class="grid" id="grid"></div>  <script>  
  
const EMAIL="richman@rootoflyfe.com";  
const PHONE="2674326734";  
  
let leads = JSON.parse(localStorage.getItem("leads")) || [  
{address:"857 E Stafford St Philadelphia PA",arv:300000,repairs:70000,owner:"",status:"new"},  
{address:"1929 Elston St Philadelphia PA",arv:230000,repairs:60000,owner:"",status:"new"}  
];  
  
function saveLeads(){  
localStorage.setItem("leads",JSON.stringify(leads));  
}  
  
function calc(d){  
let arv=parseFloat(d.arv)||0;  
return {  
cash:arv*0.5,  
carry:arv*0.65,  
creative:arv*0.75,  
down:(arv*0.65)*0.05  
};  
}  
  
function sendEmail(d){  
let c=calc(d);  
  
let body = `  
Hi ${d.owner || "there"},  
  
Regarding your property:  
${d.address}  
  
We can offer:  
  
💰 Cash Offer: $${Math.round(c.cash)}  
🤝 Seller Carry: $${Math.round(c.carry)}  
🏦 Seller Financing: $${Math.round(c.creative)}  
  
Terms:  
- No repairs  
- Close fast  
- AS-IS  
  
Let me know what works.  
  
Richardson L  
RO’Lyfe Holdings  
${EMAIL}  
`;  
  
window.location.href=`mailto:${EMAIL}?subject=Offer for ${d.address}&body=${encodeURIComponent(body)}`;  
}  
  
function sendSMS(d){  
let c=calc(d);  
  
let msg = `  
Hi, this is Richardson from RO’Lyfe Holdings.  
  
Property:  
${d.address}  
  
Cash Offer: $${Math.round(c.cash)}  
  
We buy as-is and close fast.  
  
Interested?  
`;  
  
window.location.href=`sms:${PHONE}?body=${encodeURIComponent(msg)}`;  
}  
  
function bulkSMS(){  
leads.slice(0,5).forEach(l=>sendSMS(l));  
}  
  
function downloadPDF(filename, text){  
let win = window.open("", "_blank");  
win.document.write(`<pre style="font-family:Arial;padding:40px">${text}</pre>`);  win.document.close();
setTimeout(()=>{win.print();},500);
}

function sellerContract(d){
let c=calc(d);

downloadPDF("Seller.pdf",`
PURCHASE AND SALE AGREEMENT

Property: ${d.address}

Buyer: Richardson L and/or Assigns

Price: $${Math.round(c.cash)}

EMD: $500
Inspection: 14 days
Closing: 30 days
AS-IS

Assignment allowed

Buyer: __________
Seller: __________
`);
}

function assignmentContract(d){
let c=calc(d);

downloadPDF("Assignment.pdf",`
ASSIGNMENT AGREEMENT

Property: ${d.address}

Price: $${Math.round(c.cash)}

Assignor: RO’Lyfe Holdings

Fee: ______

Signature: ______
`);
}

function pof(){
downloadPDF("POF.pdf",`
PROOF OF FUNDS

RO’Lyfe Holdings confirms funds available.

Contact:
${EMAIL}
`);
}

function updateValue(i,val){
leads[i].arv=val;
saveLeads();
render();
}

document.getElementById("csvFile").addEventListener("change",function(e){
let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(e){
let rows=e.target.result.split("\n");

leads = rows.map(r=>{
let cols=r.split(",");
return {address:cols[0],arv:cols[1]||200000,repairs:50000,owner:""};
});

saveLeads();
render();
};

reader.readAsText(file);
});

function render(){

let grid=document.getElementById("grid");
grid.innerHTML="";

leads.forEach((d,i)=>{

let c=calc(d);

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${d.address}</b>

<br>ARV:
<input value="${d.arv}" onchange="updateValue(${i},this.value)">

<div class="btn" onclick="this.nextElementSibling.classList.toggle('hidden')">▶ Open</div>  <div class="hidden">  Cash: $${Math.round(c.cash)}<br>
Carry: $${Math.round(c.carry)}<br>
Creative: $${Math.round(c.creative)}<br>

<br>  <div class="btn" onclick='sendEmail(${JSON.stringify(d)})'>📧 Send Offer</div>  
<div class="btn" onclick='sendSMS(${JSON.stringify(d)})'>📱 SMS</div>  <div class="btn" onclick='sellerContract(${JSON.stringify(d)})'>📄 Seller</div>  
<div class="btn" onclick='assignmentContract(${JSON.stringify(d)})'>📄 Assign</div>  
<div class="btn" onclick='pof()'>💼 POF</div>  <br>  <a href="https://www.zillow.com/homes/${d.address.replaceAll(" ","-")}" target="_blank">Zillow</a><br>
<a href="https://www.redfin.com/search?q=${d.address.replaceAll(" ","%20")}" target="_blank">Redfin</a><br>

<br><b>Funding</b><br>

<a href="https://rootoflyfe.blnsoftware.com/" target="_blank">BLN Portal</a><br>
<a href="https://rcncapital.com/application/?intk=GFletcher@rcncapital.com" target="_blank">RCN Apply</a><br>

<br><b>Credit</b><br>

<a href="https://www.7figurescredit.com/?a_aid=ROLFunding" target="_blank">7 Figures</a><br>

</div>  
`;  grid.appendChild(div);

});

}

render();

</script>  </body>  
</html>
