<style>
body{background:#0b0f1a;color:#fff;font-family:Arial;margin:0;padding:10px;}
h2{text-align:center;}
.grid{display:grid;gap:12px;}
.card{background:#141a2a;padding:12px;border-radius:10px;}
.card-header{display:flex;justify-content:space-between;cursor:pointer;font-weight:bold;}
.hidden{display:none;}
input,select{width:100%;padding:8px;margin:5px 0;background:#1a1f2a;border:1px solid #333;color:#fff;}
.btn{background:#2e3c66;padding:10px;margin:5px 0;border-radius:6px;text-align:center;font-weight:bold;cursor:pointer;}
.score{background:#1f2a44;padding:10px;border-radius:8px;margin-bottom:10px;text-align:center;}
.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:15px;}
.pipe{background:#111;padding:8px;border-radius:6px;text-align:center;}
a{color:#7fd1ff;display:block;margin:2px 0;text-decoration:none;}
</style>

<h2>🔥 RO’Lyfe Deal OS — FINAL SaaS</h2>

<div class="score" id="scoreboard"></div>
<div class="pipeline" id="pipeline"></div>

<div class="btn" onclick="uploadCSV()">📂 Upload CSV Leads</div>

<div class="grid" id="grid"></div>

<script>
const EMAIL="richman@rootoflyfe.com";
const PHONE="2674326734";

/* =========================
   LEADS ENGINE (125 REAL FEEL)
========================= */

let baseLeads=[
{address:"857 E Stafford St Philadelphia PA",arv:300000,repairs:70000,price:150000,status:"lead"},
{address:"2109 W Nedro Ave Philadelphia PA",arv:350000,repairs:50000,price:140000,status:"offer sent"},
{address:"742 W Somerset St Philadelphia PA",arv:220000,repairs:40000,price:120000,status:"negotiating"}
];

for(let i=0;i<122;i++){
baseLeads.push({
address:`${1200+i} Ridge Ave Philadelphia PA`,
arv:180000+(i*1200),
repairs:25000+(i*400),
price:100000+(i*900),
status:"lead"
});
}

// remove duplicates
let leadsMap=new Map();
baseLeads.forEach(l=>leadsMap.set(l.address,l));
let defaultLeads=[...leadsMap.values()].slice(0,125);

// load
let leads=JSON.parse(localStorage.getItem("leads"));
if(!leads || leads.length<100){
leads=defaultLeads;
localStorage.setItem("leads",JSON.stringify(leads));
}

function save(){localStorage.setItem("leads",JSON.stringify(leads));}

/* =========================
   CALCULATOR (THIS WAS MISSING BEFORE)
========================= */
function calc(d){
let arv=+d.arv||0;
let price=+d.price||0;
let repairs=+d.repairs||0;

return{
cash:arv*0.5,
creative:arv*0.75,
sellerFinance:arv*0.8,
profit:(arv*0.7)-price-repairs
};
}

/* =========================
   UI (TOP DASHBOARD)
========================= */
function updateUI(){
let total=0,closed=0;
let stages={lead:0,"offer sent":0,negotiating:0,signed:0,sold:0};

leads.forEach(d=>{
stages[d.status]++;
if(d.status==="sold"){
total+=calc(d).profit;
closed++;
}
});

document.getElementById("scoreboard").innerHTML=
`💰 Closed: ${closed} | Profit: $${Math.round(total)}`;

document.getElementById("pipeline").innerHTML=`
<div class="pipe">Lead<br>${stages.lead}</div>
<div class="pipe">Offer<br>${stages["offer sent"]}</div>
<div class="pipe">Negotiating<br>${stages.negotiating}</div>
<div class="pipe">Signed<br>${stages.signed}</div>
<div class="pipe">Sold<br>${stages.sold}</div>`;
}

/* =========================
   ACTIONS (FULL PREFILL)
========================= */

function autoSMS(d){
let c=calc(d);

let msg=`Hi, this is Richardson.

Property: ${d.address}

Cash Offer: $${Math.round(c.cash)}

We buy AS-IS and close fast.

Reply YES to move forward.`;

window.location.href=`sms:${PHONE}?body=${encodeURIComponent(msg)}`;
}

function sendEmail(d){
let c=calc(d);

let body=`PURCHASE & SALE AGREEMENT

Property: ${d.address}
Seller:
Buyer: Richardson L. and/or Assigns

Purchase Price: $${Math.round(c.cash)}
Earnest Money Deposit: $500 (to be held by title company)
Inspection Period: 14 days
Closing: 30 days or sooner

Condition: Property sold AS-IS

Assignment Clause: Buyer may assign or transfer interest without consent.
Additional Clause: Buyer may coordinate with funding partners and contractors.

--------------------------------------

BUYER: Richardson L. and/or Assigns
Signature: ____
Date: __________

SELLER:
Signature: __________`;

window.location.href=`mailto:${EMAIL}?subject=Offer ${d.address}&body=${encodeURIComponent(body)}`;
}

function contract(d){
let c=calc(d);
let win=window.open("","_blank");

win.document.write(`
<pre style="padding:40px;font-family:Arial">
PURCHASE AGREEMENT

Property: ${d.address}

Purchase Price: $${Math.round(c.cash)}

AS-IS | Assignable

Buyer: Richardson L
</pre>`);

setTimeout(()=>win.print(),500);
d.status="signed";
save();
render();
}

function assign(d){
window.location.href=`mailto:${EMAIL}?subject=Assignment ${d.address}`;
}

/* =========================
   STATUS (AUTO SMS TRIGGER)
========================= */
function setStatus(i,val){
leads[i].status=val;

if(val==="offer sent"){
autoSMS(leads[i]);
}

save();
render();
}

/* =========================
   LINKS
========================= */

function openZillow(addr){
window.open(`https://www.zillow.com/homes/${encodeURIComponent(addr)}_rb/`);
}

function openRedfin(addr){
window.open(`https://www.redfin.com/stingray/do/location-autocomplete?location=${encodeURIComponent(addr)}`);
}

/* =========================
   AUTO COMP
========================= */
function autoComp(d){
let avg=leads.reduce((a,b)=>a+(+b.arv||0),0)/leads.length;
d.arv=Math.round(avg);
save();
render();
}

/* =========================
   CSV UPLOAD
========================= */
function uploadCSV(){
let input=document.createElement("input");
input.type="file";
input.accept=".csv";

input.onchange=e=>{
let reader=new FileReader();
reader.onload=function(){
let rows=reader.result.split("\n").slice(1);
leads=rows.map(r=>{
let c=r.split(",");
return{
address:c[0],
arv:+c[1],
repairs:+c[2],
price:+c[3],
status:"lead"
};
});
save();render();
};
reader.readAsText(e.target.files[0]);
};
input.click();
}

/* =========================
   ANALYZER SYNC
========================= */
function fillAnalyzer(d){
if(document.getElementById("propAddress")){
propAddress.value=d.address;
arv.value=d.arv;
purchasePrice.value=d.price;
rehabCost.value=d.repairs;
}
}

/* =========================
   RENDER (THIS IS WHERE EVERYTHING SHOWS)
========================= */
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

leads.forEach((d,i)=>{
let c=calc(d);

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="card-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
${d.address} <span>${d.status}</span>
</div>

<div class="hidden">

Status:
<select onchange="setStatus(${i},this.value)">
<option ${d.status==="lead"?"selected":""}>lead</option>
<option ${d.status==="offer sent"?"selected":""}>offer sent</option>
<option ${d.status==="negotiating"?"selected":""}>negotiating</option>
<option ${d.status==="signed"?"selected":""}>signed</option>
<option ${d.status==="sold"?"selected":""}>sold</option>
</select>

ARV:
<input value="${d.arv}" onchange="leads[${i}].arv=this.value;save();render();">

Purchase Price:
<input value="${d.price}" onchange="leads[${i}].price=this.value;save();render();">

Repairs:
<input value="${d.repairs}" onchange="leads[${i}].repairs=this.value;save();render();">

<div class="btn" onclick='autoComp(leads[${i}])'>📊 Auto Comp</div>

<br><b>Offers</b><br>
Cash: $${Math.round(c.cash)}<br>
Creative: $${Math.round(c.creative)}<br>
Seller Finance: $${Math.round(c.sellerFinance)}<br>

<br><b>Profit:</b> $${Math.round(c.profit)}

<div class="btn" onclick='openZillow("${d.address}")'>🏡 Zillow</div>
<div class="btn" onclick='openRedfin("${d.address}")'>📍 Redfin</div>

<div class="btn" onclick='sendEmail(leads[${i}])'>📧 Email</div>
<div class="btn" onclick='autoSMS(leads[${i}])'>📱 SMS</div>
<div class="btn" onclick='contract(leads[${i}])'>📄 Contract</div>
<div class="btn" onclick='assign(leads[${i}])'>📑 Assign</div>
<div class="btn" onclick='fillAnalyzer(leads[${i}])'>📥 Analyzer</div>

<!-- ALL YOUR LINKS KEPT -->
<br><b>PROPERTY INTEL</b>
<a href="https://property.phila.gov" target="_blank">Phila Property</a>
<a href="https://opainquiry.phila.gov" target="_blank">OPA</a>
<a href="https://www.phila.gov/services/property-lots-housing/find-property-information" target="_blank">CityAtlas</a>
<a href="https://pennsylvania.propertychecker.com" target="_blank">PropertyChecker</a>
<a href="https://www.propertyreach.com" target="_blank">PropertyReach</a>

<br><b>RURAL</b>
<a href="https://www.consumerfinance.gov/rural-or-underserved-tool/#rural-or-underserved" target="_blank">CFPB Tool</a>
<a href="https://eligibility.sc.egov.usda.gov/eligibility/welcomeAction.do?pageAction=sfp" target="_blank">USDA</a>

<br><b>FUNDING & BROKER</b>
<a href="https://rootoflyfe.blnsoftware.com/" target="_blank">BLN Portal</a>
<a href="https://rcncapital.com/application/?intk=GFletcher@rcncapital.com" target="_blank">RCN Apply</a>
<a href="https://form.jotform.com/2530967310210469" target="_blank">Funding App</a>
<a href="https://form.jotform.com/252063354378055" target="_blank">RO Intake</a>
<a href="https://form.jotform.com/253154859148062" target="_blank">Quick Docs</a>

<br><b>AFFILIATE / CREDIT</b>
<a href="https://www.7figurescredit.com/?a_aid=ROLFunding" target="_blank">7 Figures Credit</a>
<a href="https://go.mypartner.io/referral-partner/?ref=001Qk00000MkqgTIAR" target="_blank">ROK Corporate</a>

<a href="https://getyourbizloan.io/lp1?pu=recqKxJNkvD70xMqi" target="_blank">LP1</a>
<a href="https://getyourbizloan.io/lp2?pu=recqKxJNkvD70xMqi" target="_blank">LP2</a>

<br><b>CREDIT STACK</b>
<a href="https://www.creditscoreiq.com/lander/bus?offercode=435404PA" target="_blank">ScoreIQ</a>
<a href="https://www.myscoreiq.com/get-fico-preferred.aspx?offercode=432142NZ" target="_blank">FICO View</a>

<br><b>STARTER CARDS</b>
<a href="https://www.openskycc.com/" target="_blank">OpenSky</a>

<a href="https://www.self.inc/" target="_blank">Self Loan</a>

</div>
`;

grid.appendChild(div);
});

updateUI();
}

render();
</script>








<!DOCTYPE html>
<html>
<head>
<title>RO'Lyfe Deal Machine</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px;}
input,select{width:100%;padding:10px;margin:5px 0;background:#1e293b;color:#fff;border:none;border-radius:6px;}
button{padding:12px;background:#22c55e;border:none;color:#000;font-weight:bold;width:100%;border-radius:6px;margin-top:10px;}
.box{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:15px;}
</style>
</head>

<body>

<h2>RO’Lyfe Funding & Deal Machine</h2>

<div class="box">
<h3>Broker Info</h3>
<input id="broker" value="Richardson L. - RO’Lyfe Holdings">
<input id="fee" placeholder="Broker Fee % (1-3%)">
</div>

<div class="box">
<h3>Client / Borrower</h3>
<input id="name" placeholder="Full Name">
<input id="entity" placeholder="Entity Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
</div>

<div class="box">
<h3>Deal Info</h3>
<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="rehab" placeholder="Rehab Cost">
<input id="arv" placeholder="ARV">
<input id="units" placeholder="Units">
</div>

<div class="box">
<h3>3-Tier Settings</h3>
<input id="cashPct" value="50">
<input id="carryPct" value="65">
<input id="creativePct" value="75">
</div>

<div class="box">
<h3>Results</h3>
<p id="cash"></p>
<p id="carry"></p>
<p id="creative"></p>
</div>

<button onclick="calc()">Calculate</button>
<button onclick="downloadPDF()">Download Offer PDF</button>
<button onclick="sendEmail()">Send Deal</button>

<script>

function calc(){
let arv=document.getElementById("arv").value;

let cash=arv*(document.getElementById("cashPct").value/100);
let carry=arv*(document.getElementById("carryPct").value/100);
let creative=arv*(document.getElementById("creativePct").value/100);

document.getElementById("cash").innerHTML="Cash Offer: $"+Math.round(cash);
document.getElementById("carry").innerHTML="Seller Carry: $"+Math.round(carry);
document.getElementById("creative").innerHTML="Seller Finance: $"+Math.round(creative);
}

function downloadPDF(){
alert("Connect jsPDF or Zoho Writer API for full PDF generation");
}

function sendEmail(){
let name=document.getElementById("name").value;
let address=document.getElementById("address").value;

window.location.href="mailto:richman@rootoflyfe.com?subject=Deal Submission&body=Name:"+name+" Property:"+address;
}

</script>

</body>
</html>
