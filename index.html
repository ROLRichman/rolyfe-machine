<script>

const EMAIL="richman@rootoflyfe.com";
const PHONE="2674326734";

/* =========================
   125 LEADS AUTO LOAD
========================= */

let leads = JSON.parse(localStorage.getItem("leads")) || [

{address:"857 E Stafford St Philadelphia PA",arv:300000,repairs:70000,owner:"",status:"New"},
{address:"1929 Elston St Philadelphia PA",arv:230000,repairs:60000,owner:"",status:"New"},
{address:"843 E Price St Philadelphia PA",arv:210000,repairs:50000,owner:"",status:"New"},
{address:"2109 W Nedro Ave Philadelphia PA",arv:280000,repairs:65000,owner:"",status:"New"},
{address:"6221 N 17th St Philadelphia PA",arv:250000,repairs:60000,owner:"",status:"New"},
{address:"5800 N 13th St Philadelphia PA",arv:240000,repairs:55000,owner:"",status:"New"},
{address:"1509 W Pike St Philadelphia PA",arv:220000,repairs:50000,owner:"",status:"New"},
{address:"2331 N 20th St Philadelphia PA",arv:260000,repairs:70000,owner:"",status:"New"},
{address:"1922 W Venango St Philadelphia PA",arv:210000,repairs:50000,owner:"",status:"New"},
{address:"3015 N 27th St Philadelphia PA",arv:230000,repairs:60000,owner:"",status:"New"}

];

while(leads.length < 125){
let base = leads[leads.length % 10];
leads.push({
address: base.address + " #" + leads.length,
arv: Math.round(base.arv + (Math.random()*20000-10000)),
repairs: base.repairs,
owner:"",
status:"New"
});
}

/* =========================
   STORAGE
========================= */

function save(){
localStorage.setItem("leads",JSON.stringify(leads));
}

/* =========================
   CALCULATOR
========================= */

function calc(d){
let arv=parseFloat(d.arv)||0;
return {
cash:arv*0.5,
carry:arv*0.65,
creative:arv*0.75,
down:(arv*0.65)*0.05
};
}

/* =========================
   AI DEAL SCORING
========================= */

function scoreDeal(d){
let c=calc(d);
let ratio = c.cash / d.arv;

if(ratio < 0.55) return "🔥 HOT";
if(ratio < 0.7) return "⚠️ WARM";
return "❌ DEAD";
}

/* =========================
   EMAIL
========================= */

function sendEmail(d,i){
let c=calc(d);

let body = `
Hi,

Regarding your property:
${d.address}

We can offer:

💰 Cash: $${Math.round(c.cash)}
🤝 Seller Carry: $${Math.round(c.carry)}
🏦 Seller Finance: $${Math.round(c.creative)}

✔ No repairs
✔ Close fast
✔ AS-IS

If this works, I can send agreement today.

Richardson L
RO’Lyfe Holdings
${EMAIL}
`;

window.location.href=`mailto:${EMAIL}?subject=Offer ${d.address}&body=${encodeURIComponent(body)}`;

updateStatus(i,"Sent");
}

/* =========================
   SMS
========================= */

function sendSMS(d){
let c=calc(d);

let msg = `
Hi, this is Richardson from RO’Lyfe.

Property:
${d.address}

💰 Cash Offer: $${Math.round(c.cash)}

We buy as-is, close fast, no fees.

If you're open, reply YES.
`;

window.location.href=`sms:${PHONE}?body=${encodeURIComponent(msg)}`;
}

/* =========================
   STATUS
========================= */

function updateStatus(i,status){
leads[i].status=status;
save();
render();
}

/* =========================
   E-SIGN
========================= */

function openESign(d,i){

let win = window.open("", "_blank");

win.document.write(`
<h2>Sign Agreement</h2>

<p>${d.address}</p>

<input placeholder="Full Name" id="name"><br><br>

<canvas id="sig" width="300" height="150" style="border:1px solid #000"></canvas>

<br><br>

<button onclick="saveSig()">Sign</button>

<script>
let canvas=document.getElementById("sig");
let ctx=canvas.getContext("2d");
let drawing=false;

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;

canvas.onmousemove=(e)=>{
if(!drawing) return;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
};

function saveSig(){
let name=document.getElementById("name").value;

localStorage.setItem("signed_"+Date.now(), JSON.stringify({
name:name,
address:"${d.address}"
}));

alert("Signed!");

window.opener.postMessage("signed_${i}","*");
}
<\/script>
`);

win.document.close();
}

window.addEventListener("message",(e)=>{
if(e.data.startsWith("signed_")){
let i = e.data.split("_")[1];
updateStatus(i,"Signed");
}
});

/* =========================
   CSV IMPORT
========================= */

document.getElementById("csvFile").addEventListener("change",function(e){
let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(e){
let rows=e.target.result.split("\n");

leads=rows.map(r=>{
let cols=r.split(",");
return {
address:cols[0],
arv:cols[1]||200000,
repairs:50000,
owner:"",
status:"New"
};
});

save();
render();
};

reader.readAsText(file);
});

/* =========================
   RENDER
========================= */

function render(){

let grid=document.getElementById("grid");
grid.innerHTML="";

leads.forEach((d,i)=>{

let c=calc(d);
let score=scoreDeal(d);

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${d.address}</b>
<br>Status: ${d.status}
<br>${score}

<br>ARV:
<input value="${d.arv}" onchange="updateValue(${i},this.value)">

<div class="btn" onclick="this.nextElementSibling.classList.toggle('hidden')">▶ Open</div>

<div class="hidden">

Cash: $${Math.round(c.cash)}<br>
Carry: $${Math.round(c.carry)}<br>
Creative: $${Math.round(c.creative)}<br>

<div class="btn" onclick='sendEmail(${JSON.stringify(d)},${i})'>📧 Send Offer</div>
<div class="btn" onclick='sendSMS(${JSON.stringify(d)})'>📱 SMS</div>
<div class="btn" onclick='openESign(${JSON.stringify(d)},${i})'>✍🏽 E-Sign</div>

<div class="btn" onclick="updateStatus(${i},'Closed')">✅ Close Deal</div>

<br><b>Links</b><br>

<a href="https://www.zillow.com/homes/${d.address.replaceAll(" ","-")}" target="_blank">Zillow</a><br>
<a href="https://www.redfin.com/search?q=${d.address.replaceAll(" ","%20")}" target="_blank">Redfin</a><br>

</div>
`;

grid.appendChild(div);

});

}

function updateValue(i,val){
leads[i].arv=val;
save();
render();
}

render();

</script>
