<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO’Lyfe Deal OS — CLOSER MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#0b0f1a;color:#fff;font-family:Arial;margin:0;padding:10px;}
.grid{display:grid;grid-template-columns:1fr;gap:10px;}
.card{background:#141a2a;padding:12px;border-radius:10px;}
.card-header{display:flex;justify-content:space-between;cursor:pointer}
.hidden{display:none;}
input,select{width:100%;padding:8px;background:#1a1f2a;border:1px solid #333;color:#fff;}
.btn{background:#2e3c66;padding:10px;margin:4px 0;border-radius:6px;text-align:center;font-weight:bold;}
a{color:#7fd1ff;display:block;margin:2px 0;text-decoration:none;}
</style>
</head>

<body>

<h2>🔥 RO’Lyfe Deal OS — CLOSER MODE</h2>
<div class="grid" id="grid"></div>

<script>
const EMAIL="richman@rootoflyfe.com";
const PHONE="2674326734";

// ------------------- LEADS -------------------
let leads = JSON.parse(localStorage.getItem("leads")) || [
{address:"857 E Stafford St Philadelphia PA",arv:300000,repairs:70000,status:"lead",price:150000}
];

// ------------------- SAVE -------------------
function save(){ localStorage.setItem("leads",JSON.stringify(leads)); }

// ------------------- CALC -------------------
function calc(d){
let arv=parseFloat(d.arv)||0;
return{
cash:arv*0.5,
carry:arv*0.65,
creative:arv*0.75,
sellerFinance:arv*0.8,
profit:(arv*0.7)-(d.price||0)-(d.repairs||0)
};
}

// ------------------- AUTO STRATEGY -------------------
function strategy(d){
let c=calc(d);
if(c.cash <= d.arv*0.5) return "🔥 Wholesale";
if(c.cash <= d.arv*0.6) return "🏗 Fix & Flip";
if(c.cash <= d.arv*0.7) return "🏠 Rental";
return "💰 Seller Finance";
}

// ------------------- STATUS COLOR -------------------
function statusColor(s){
if(s==="lead") return "#888";
if(s==="offer sent") return "#3498db";
if(s==="negotiating") return "#f1c40f";
if(s==="signed") return "#2ecc71";
if(s==="sold") return "#27ae60";
return "#fff";
}

// ------------------- ACTIONS -------------------
function sendSMS(d){
let c=calc(d);
let msg=`Hi, this is Richardson.

Property: ${d.address}

Cash Offer: $${Math.round(c.cash)}

We buy AS-IS, close fast.

Reply YES to move forward.`;

window.location.href=`sms:${PHONE}?body=${encodeURIComponent(msg)}`;
d.status="offer sent"; save();
}

function sendEmail(d){
let c=calc(d);

let body=`PURCHASE OFFER

Property: ${d.address}

Cash Offer: $${Math.round(c.cash)}
Seller Finance: $${Math.round(c.sellerFinance)}

AS-IS | Fast Close | Assignable

Richardson L
RO’Lyfe Holdings
${EMAIL}`;

window.location.href=`mailto:${EMAIL}?subject=Offer ${d.address}&body=${encodeURIComponent(body)}`;
}

// ------------------- PDF ENGINE -------------------
function downloadPDF(title, content){
let win = window.open("", "_blank");
win.document.write(`
<html>
<head>
<title>${title}</title>
<style>
body{font-family:Arial;padding:40px;line-height:1.6;}
h2{text-align:center;}
</style>
</head>
<body>
<h2>${title}</h2>
<pre>${content}</pre>
<script>
setTimeout(()=>{window.print();},500);
<\/script>
</body>
</html>
`);
}

// ------------------- CONTRACTS -------------------
function sellerContract(d){
let c=calc(d);

downloadPDF("PURCHASE & SALE AGREEMENT",`
Property: ${d.address}
Buyer: Richardson L and/or Assigns

Purchase Price: $${Math.round(c.cash)}
Earnest Money Deposit: $500
Inspection Period: 14 days
Closing: 30 days or sooner

Condition: AS-IS
Assignment: Allowed

--- DISCLOSURE ---
Buyer may assign or profit from this deal.
Buyer is not acting as agent.
Seller advised to seek legal counsel.

BUYER SIGNATURE: __________________
SELLER SIGNATURE: __________________
`);
d.status="signed"; save();
}

function assignmentContract(d){
downloadPDF("ASSIGNMENT AGREEMENT",`
Property: ${d.address}

Assignor: Richardson L
Assignee: __________________

Assignment Fee: $__________

All rights transferred.

Assignor: __________
Assignee: __________
`);
}

// ------------------- 1 CLICK CLOSE -------------------
function quickClose(d){
sendSMS(d);
setTimeout(()=>{sellerContract(d);},1500);
}

// ------------------- AUTO ARV COMP (NO API) -------------------
function autoComp(d){
let avg = leads.reduce((sum,l)=>sum+(parseFloat(l.arv)||0),0)/leads.length;
d.arv = Math.round(avg);
save();
render();
}

// ------------------- RENDER -------------------
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

leads.forEach((d,i)=>{
let c=calc(d);

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="card-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
<b>${d.address}</b>
<span style="color:${statusColor(d.status)}">${d.status}</span>
</div>

<div class="hidden">

Status:
<select onchange="leads[${i}].status=this.value;save();render();">
<option ${d.status==="lead"?"selected":""}>lead</option>
<option ${d.status==="offer sent"?"selected":""}>offer sent</option>
<option ${d.status==="negotiating"?"selected":""}>negotiating</option>
<option ${d.status==="signed"?"selected":""}>signed</option>
<option ${d.status==="sold"?"selected":""}>sold</option>
</select>

ARV:
<input value="${d.arv}" onchange="leads[${i}].arv=this.value;save();render();">

<div class="btn" onclick='autoComp(leads[${i}])'>📊 Auto Comp ARV</div>

<br><b>Offers</b><br>
Cash: $${Math.round(c.cash)}<br>
Seller Carry: $${Math.round(c.carry)}<br>
Creative: $${Math.round(c.creative)}<br>
Seller Finance: $${Math.round(c.sellerFinance)}<br>

<br><b>Profit Est:</b> $${Math.round(c.profit)}

<div class="btn" onclick='sendEmail(${JSON.stringify(d)})'>📧 Offer</div>
<div class="btn" onclick='sendSMS(${JSON.stringify(d)})'>📱 SMS</div>
<div class="btn" onclick='sellerContract(${JSON.stringify(d)})'>📄 Contract</div>
<div class="btn" onclick='assignmentContract(${JSON.stringify(d)})'>📑 Assignment</div>
<div class="btn" onclick='quickClose(${JSON.stringify(d)})'>⚡ 1-Click Close</div>

<a href="https://www.myscoreiq.com/get-fico-preferred.aspx?offercode=432142NZ" target="_blank">FICO View</a>
<a href="https://www.identityiq.com/sc-securepreferred.aspx?offercode=431297MR" target="_blank">IdentityIQ</a>
<a href="https://www.creditbuilderiq.com/lander/bus?offercode=437502WT" target="_blank">Builder IQ</a>

<br><b>STARTER CARDS</b>
<a href="https://www.openskycc.com/" target="_blank">OpenSky</a>
<a href="https://www.tomocredit.com/" target="_blank">Tomo</a>
<a href="https://www.zolve.com/" target="_blank">Zolve</a>
<a href="https://www.growcredit.com/" target="_blank">Grow Credit</a>
<a href="https://www.discover.com/credit-cards/secured/" target="_blank">Discover Secured</a>
<a href="https://www.capitalone.com/credit-cards/quicksilver-secured/" target="_blank">Capital One</a>
<a href="https://www.self.inc/" target="_blank">Self Loan</a>

</div>
`;

grid.appendChild(div);
});
}

render();
</script>

</body>
</html>
