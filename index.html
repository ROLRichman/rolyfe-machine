<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO’Lyfe Deal OS — SaaS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#0b0f1a;color:#fff;font-family:Arial;margin:0;padding:10px;}
.grid{display:grid;gap:12px;}
.card{background:#141a2a;padding:12px;border-radius:10px;}
.card-header{display:flex;justify-content:space-between;cursor:pointer;font-weight:bold;}
.hidden{display:none;}
input,select{width:100%;padding:8px;margin:5px 0;background:#1a1f2a;border:1px solid #333;color:#fff;}
.btn{background:#2e3c66;padding:10px;margin:5px 0;border-radius:6px;text-align:center;font-weight:bold;cursor:pointer;}
.score{background:#1f2a44;padding:10px;border-radius:8px;margin-bottom:10px;text-align:center;}
a{color:#7fd1ff;display:block;margin:2px 0;text-decoration:none;}
</style>
</head>

<body>

<h2>🔥 RO’Lyfe Deal OS — SaaS Mode</h2>
<div class="score" id="scoreboard"></div>
<div class="grid" id="grid"></div>

<script>
const EMAIL="richman@rootoflyfe.com";
const PHONE="2674326734";

// ---------------- REAL 125 LEADS ----------------
let defaultLeads = [];
for(let i=0;i<125;i++){
  defaultLeads.push({
    address: `${800+i} W Sample St Philadelphia PA`,
    arv: 200000 + (i*1500),
    repairs: 30000 + (i*200),
    price: 90000 + (i*1200),
    seller: "Owner "+(i+1),
    status: "lead"
  });
}

// LOAD
let leads = JSON.parse(localStorage.getItem("leads"));
if(!leads || leads.length<125){
  leads = defaultLeads;
  localStorage.setItem("leads", JSON.stringify(leads));
}

function save(){localStorage.setItem("leads", JSON.stringify(leads));}

// ---------------- CALCULATIONS ----------------
function calc(d){
let arv=+d.arv||0;
let price=+d.price||0;
let repairs=+d.repairs||0;

return{
cash:arv*0.5,
carry:arv*0.65,
creative:arv*0.75,
sellerFinance:arv*0.8,
profit:(arv*0.7)-price-repairs,
ltv:(price/arv*100).toFixed(1)
};
}

// ---------------- CONTRACT ----------------
function buildContract(d){
let c=calc(d);

return `PURCHASE & SALE AGREEMENT

Property: ${d.address}
Seller: ${d.seller || "________"}
Buyer: Richardson L. and/or Assigns

Purchase Price: $${Math.round(c.cash)}
Earnest Money Deposit: $500
Inspection Period: 14 days
Closing: 30 days or sooner

Condition: Property sold AS-IS

Assignment Clause:
Buyer may assign or transfer interest without consent.

Additional Clause:
Buyer may coordinate with funding partners.

--------------------------------------
SIGNATURES

BUYER: Richardson L.
Signature: __________

SELLER: ${d.seller || "________"}
Signature: __________
`;
}

// ---------------- ACTIONS ----------------
function sendSMS(d){
let msg = buildContract(d);
window.location.href=`sms:${PHONE}?body=${encodeURIComponent(msg)}`;
d.status="offer sent"; save(); render();
}

function sendEmail(d){
let msg = buildContract(d);
window.location.href=`mailto:${EMAIL}?subject=Offer ${d.address}&body=${encodeURIComponent(msg)}`;
}

function assign(d){
let msg=`ASSIGNMENT AGREEMENT\nProperty: ${d.address}\nAssignor: Richardson L`;
window.location.href=`mailto:${EMAIL}?subject=Assignment ${d.address}&body=${encodeURIComponent(msg)}`;
}

// ---------------- ZILLOW / REDFIN ----------------
function openZillow(d){
let url="https://www.zillow.com/homes/"+encodeURIComponent(d.address)+"_rb/";
window.open(url,"_blank");
}

function openRedfin(d){
let url="https://www.redfin.com/stingray/do/location-autocomplete?location="+encodeURIComponent(d.address);
window.open("https://www.redfin.com","_blank");
}

// ---------------- ANALYZER SYNC ----------------
function fillAnalyzer(d){
document.getElementById("propAddress").value=d.address;
document.getElementById("purchasePrice").value=d.price;
document.getElementById("arv").value=d.arv;
document.getElementById("rehabCost").value=d.repairs;
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

// ---------------- SCOREBOARD ----------------
function updateScore(){
let total=0, deals=0;
leads.forEach(d=>{
if(d.status==="sold"){
total+=calc(d).profit;
deals++;
}
});
document.getElementById("scoreboard").innerHTML=
`💰 Deals Closed: ${deals} | Profit: $${Math.round(total)}`;
}

// ---------------- RENDER ----------------
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

leads.forEach((d,i)=>{
let c=calc(d);

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="card-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
${d.address}
<span>${d.status}</span>
</div>

<div class="hidden">

Price:
<input value="${d.price}" onchange="leads[${i}].price=this.value;save();render();">

ARV:
<input value="${d.arv}" onchange="leads[${i}].arv=this.value;save();render();">

Repairs:
<input value="${d.repairs}" onchange="leads[${i}].repairs=this.value;save();render();">

Seller:
<input value="${d.seller}" onchange="leads[${i}].seller=this.value;save();render();">

<b>Offers</b><br>
Cash: $${Math.round(c.cash)}<br>
Creative: $${Math.round(c.creative)}<br>
Seller Finance: $${Math.round(c.sellerFinance)}<br>

<b>Profit:</b> $${Math.round(c.profit)}<br>
<b>LTV:</b> ${c.ltv}%<br>

<div class="btn" onclick='sendSMS(${JSON.stringify(d)})'>📱 SMS</div>
<div class="btn" onclick='sendEmail(${JSON.stringify(d)})'>📧 Email</div>
<div class="btn" onclick='assign(${JSON.stringify(d)})'>📑 Assign</div>
<div class="btn" onclick='fillAnalyzer(${JSON.stringify(d)})'>📥 Analyzer</div>

<div class="btn" onclick='openZillow(${JSON.stringify(d)})'>🏠 Zillow</div>
<div class="btn" onclick='openRedfin(${JSON.stringify(d)})'>📍 Redfin</div>

<!-- ALL YOUR LINKS KEPT -->
<br><b>PROPERTY INTEL</b>
<a href="https://property.phila.gov" target="_blank">Phila Property</a>
<a href="https://opainquiry.phila.gov" target="_blank">OPA</a>
<a href="https://www.phila.gov/services/property-lots-housing/find-property-information" target="_blank">CityAtlas</a>
<a href="https://pennsylvania.propertychecker.com" target="_blank">PropertyChecker</a>
<a href="https://www.propertyreach.com" target="_blank">PropertyReach</a>

<br><b>FUNDING & BROKER</b>
<a href="https://rootoflyfe.blnsoftware.com/" target="_blank">BLN Portal</a>
<a href="https://rcncapital.com/application/?intk=GFletcher@rcncapital.com" target="_blank">RCN Apply</a>
<a href="https://form.jotform.com/2530967310210469" target="_blank">Funding App</a>

</div>
`;

grid.appendChild(div);
});

updateScore();
}

render();
</script>

</body>
</html>
