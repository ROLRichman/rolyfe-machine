<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO’Lyfe Deal OS — CLOSER MODE</title>
<style>
body{background:#0b0f1a;color:#fff;font-family:Arial;padding:10px;margin:0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:10px;margin-top:10px}
.card{background:#141a2a;padding:12px;border-radius:10px}
.btn{background:#1f2a44;padding:7px;margin:4px;display:inline-block;cursor:pointer;border-radius:6px;text-align:center}
.btn:hover{background:#2e3c66}
.hidden{display:none}
input,select,textarea{width:100%;padding:6px;margin-top:5px;background:#0b0f1a;color:#fff;border:1px solid #333}
canvas{background:#fff;border-radius:6px;margin-top:10px}
</style>
</head>
<body>

<h2>🔥 RO’Lyfe Deal OS — CLOSER MODE</h2>
<select id="strategy">
<option>Wholesale</option>
<option>Fix & Flip</option>
<option>Rental</option>
<option>Bridge</option>
</select>
<input type="file" id="csvFile" class="btn">
<div class="btn" onclick="bulkSMS()">📲 Bulk SMS</div>

<div class="grid" id="grid"></div>

<script>
const EMAIL="richman@rootoflyfe.com";
const PHONE="2674326734";

// ------------------- 125 Lead Dataset -------------------
let leads = JSON.parse(localStorage.getItem("leads")) || [
{address:"857 E Stafford St Philadelphia PA",arv:300000,repairs:70000,owner:"",status:"new"},
{address:"1929 Elston St Philadelphia PA",arv:230000,repairs:60000,owner:"",status:"new"},
{address:"843 E Price St Philadelphia PA",arv:210000,repairs:50000,owner:"",status:"new"},
{address:"2109 W Nedro Ave Philadelphia PA",arv:280000,repairs:65000,owner:"",status:"new"},
{address:"6221 N 17th St Philadelphia PA",arv:250000,repairs:60000,owner:"",status:"new"},
{address:"5800 N 13th St Philadelphia PA",arv:240000,repairs:55000,owner:"",status:"new"},
{address:"1509 W Pike St Philadelphia PA",arv:220000,repairs:50000,owner:"",status:"new"},
{address:"2331 N 20th St Philadelphia PA",arv:260000,repairs:70000,owner:"",status:"new"},
{address:"1922 W Venango St Philadelphia PA",arv:210000,repairs:50000,owner:"",status:"new"},
{address:"3015 N 27th St Philadelphia PA",arv:230000,repairs:60000,owner:"",status:"new"}
];

while(leads.length<125){
    let base = leads[leads.length%10];
    leads.push({ 
        address: base.address + " #" + leads.length,
        arv: base.arv + Math.round(Math.random()*20000-10000),
        repairs: base.repairs,
        owner:"",
        status:"new"
    });
}

let buyers = [
{name:"RJ Construction",type:"FixFlip",email:""},
{name:"Local Landlord",type:"Rental",email:""},
{name:"Cash Investor",type:"Wholesale",email:""}
];

// ------------------- Utility Functions -------------------
function save(){ localStorage.setItem("leads",JSON.stringify(leads)); }
function calc(d){ let arv=parseFloat(d.arv)||0; return {cash:arv*0.5,carry:arv*0.65,creative:arv*0.75,down:(arv*0.65)*0.05}; }

function sendEmail(d){
    let c=calc(d);
    let body=`Hi,\nProperty: ${d.address}\nCash Offer: $${Math.round(c.cash)}\nWe can close fast, buy as-is, no fees.\nRichardson L\n${EMAIL}`;
    window.location.href=`mailto:${EMAIL}?subject=Offer ${d.address}&body=${encodeURIComponent(body)}`;
    d.status="Sent"; save(); render();
}

function sendSMS(d){
    let c=calc(d);
    let msg=`Hi, this is Richardson from RO’Lyfe Holdings.\n\nAbout your property: ${d.address}\n💰 Cash Offer: $${Math.round(c.cash)}\nWe can: ✔ Buy as-is ✔ Close fast (14–30 days) ✔ No fees or repairs\n\nIf you're open to selling, reply YES or call me.\n\n- Richardson`;
    window.location.href=`sms:${PHONE}?body=${encodeURIComponent(msg)}`;
}

function bulkSMS(){ leads.slice(0,10).forEach(l=>sendSMS(l)); }

function signPad(id){
    let canvas=document.getElementById(id);
    let ctx=canvas.getContext("2d");
    let drawing=false;
    canvas.onmousedown=()=>drawing=true;
    canvas.onmouseup=()=>drawing=false;
    canvas.onmousemove=e=>{ if(!drawing) return; ctx.fillRect(e.offsetX,e.offsetY,2,2); };
}

function sellerContract(d,i){
    let c=calc(d);
    let win=window.open("","_blank");
    win.document.write(`<h2>Purchase Agreement</h2><p>${d.address}</p><p>Price: $${Math.round(c.cash)}</p><canvas id="sig" width="300" height="100"></canvas><button onclick="window.print()">Print / Save PDF</button><script>(${signPad.toString()})("sig")<\/script>`);
    d.status="Signed"; save();
}

function matchBuyer(d){
    let strategy=document.getElementById("strategy").value;
    let match = buyers.find(b => 
        (strategy==="Fix & Flip" && b.type==="FixFlip") ||
        (strategy==="Rental" && b.type==="Rental") ||
        (strategy==="Wholesale" && b.type==="Wholesale") ||
        (strategy==="Bridge" && b.type==="Bridge")
    );
    alert("Best Buyer: " + (match?match.name:"No match yet"));
}

// ------------------- CSV Import -------------------
document.getElementById("csvFile").addEventListener("change",function(e){
    let file=e.target.files[0];
    let reader=new FileReader();
    reader.onload=function(e){
        let rows=e.target.result.split("\n");
        leads=rows.map(r=>{ let cols=r.split(","); return {address:cols[0],arv:cols[1]||200000,repairs:50000,owner:"",status:"New"}; });
        save(); render();
    };
    reader.readAsText(file);
});

// ------------------- Render Function -------------------
function render(){
    let grid=document.getElementById("grid"); grid.innerHTML="";
    leads.forEach((d,i)=>{
        let c=calc(d);
        let div=document.createElement("div"); div.className="card";
        div.innerHTML=`
        <b>${d.address}</b><br>Status: ${d.status}<br>
        ARV: <input value="${d.arv}" onchange="updateValue(${i},this.value)">
        <div class="btn" onclick="this.nextElementSibling.classList.toggle('hidden')">▶ Open</div>
        <div class="hidden">
            Cash: $${Math.round(c.cash)}<br>
            Carry: $${Math.round(c.carry)}<br>
            Creative: $${Math.round(c.creative)}<br>
            <div class="btn" onclick='sendEmail(${JSON.stringify(d)})'>📧 Send Offer</div>
            <div class="btn" onclick='sendSMS(${JSON.stringify(d)})'>📱 SMS</div>
            <div class="btn" onclick='sellerContract(${JSON.stringify(d)},${i})'>✍️ E-Sign</div>
            <div class="btn" onclick='matchBuyer(${JSON.stringify(d)})'>🤝 Match Buyer</div>
            <br><b>Links</b><br>
            <a href="https://www.zillow.com/homes/${d.address.replaceAll(" ","-")}" target="_blank">Zillow</a><br>
            <a href="https://www.redfin.com/search?q=${d.address.replaceAll(" ","%20")}" target="_blank">Redfin</a><br>
        </div>`;
        grid.appendChild(div);
    });
}

function updateValue(i,val){ leads[i].arv=val; save(); render(); }

render();
</script>
</body>
</html>
