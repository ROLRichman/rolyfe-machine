<style>
body{background:#0b0f1a;color:#fff;font-family:Arial;margin:0;padding:10px;}
h2{text-align:center;}
.grid{display:grid;gap:12px;}
.card{background:#141a2a;padding:12px;border-radius:10px;}
.card-header{display:flex;justify-content:space-between;cursor:pointer;font-weight:bold;}
.hidden{display:none;}
input,select{width:100%;padding:8px;margin:5px 0;background:#1a1f2a;border:1px solid #333;color:#fff;}
.btn{background:#2e3c66;padding:10px;margin:5px 0;border-radius:6px;text-align:center;font-weight:bold;cursor:pointer;}
.score{background:#1f2a44;padding:10px;border-radius:8px;margin-bottom:10px;text-align:center;}
.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:15px;}
.pipe{background:#111;padding:8px;border-radius:6px;text-align:center;}
a{color:#7fd1ff;display:block;margin:2px 0;text-decoration:none;}
.offerbox{background:#1a2238;padding:10px;border-radius:8px;margin-top:10px;}
</style>

<h2>🔥 RO’Lyfe Deal OS — GitHub SaaS</h2>

<div class="score" id="scoreboard"></div>
<div class="pipeline" id="pipeline"></div>
<div class="btn" onclick="uploadCSV()">📂 Upload CSV Leads</div>
<div class="grid" id="grid"></div>

<script>
const EMAIL="richman@rootoflyfe.com";
const PHONE="2674326734";

// ------------------- LEADS -------------------
let baseLeads=[
{address:"857 E Stafford St Philadelphia PA",arv:300000,repairs:70000,status:"lead",price:150000},
{address:"2109 W Nedro Ave Philadelphia PA",arv:350000,repairs:50000,status:"offer sent",price:229169},
{address:"742 W Somerset St Philadelphia PA",arv:220000,repairs:40000,status:"negotiating",price:120000}
];

for(let i=0;i<122;i++){
baseLeads.push({
address:`${1200+i} Ridge Ave Philadelphia PA`,
arv:180000+(i*1200),
repairs:25000+(i*400),
price:100000+(i*900),
status:"lead"
});
}

let map=new Map();
baseLeads.forEach(l=>map.set(l.address,l));
let defaultLeads=[...map.values()].slice(0,125);

let leads=JSON.parse(localStorage.getItem("leads"));
if(!leads || leads.length<50){
leads=defaultLeads;
localStorage.setItem("leads",JSON.stringify(leads));
}

function save(){localStorage.setItem("leads",JSON.stringify(leads));}

// ------------------- CALC -------------------
function calc(d){
let arv=+d.arv||0;
let price=+d.price||0;
let repairs=+d.repairs||0;

return{
cash:arv*0.5,
creative:arv*0.75,
sellerFinance:arv*0.8,
profit:(arv*0.7)-price-repairs
};
}

// ------------------- AUTO COMP -------------------
function autoComp(i){
let avg=leads.reduce((a,b)=>a+(+b.arv||0),0)/leads.length;
leads[i].arv=Math.round(avg);
save();render();
}

// ------------------- UI -------------------
function updateUI(){
let total=0,closed=0;
let stages={lead:0,"offer sent":0,negotiating:0,signed:0,sold:0};

leads.forEach(d=>{
stages[d.status]++;
if(d.status==="sold"){total+=calc(d).profit;closed++;}
});

document.getElementById("scoreboard").innerHTML=
`💰 Closed: ${closed} | Profit: $${Math.round(total)}`;

document.getElementById("pipeline").innerHTML=`
<div class="pipe">Lead<br>${stages.lead}</div>
<div class="pipe">Offer<br>${stages["offer sent"]}</div>
<div class="pipe">Negotiating<br>${stages.negotiating}</div>
<div class="pipe">Signed<br>${stages.signed}</div>
<div class="pipe">Sold<br>${stages.sold}</div>`;
}

// ------------------- ACTIONS -------------------
function autoSMS(d){
let msg=`Property: ${d.address}
Offer: $${Math.round(calc(d).cash)}
Reply YES to proceed.`;

window.location.href=`sms:${PHONE}?body=${encodeURIComponent(msg)}`;
}

function sendEmail(d){
let c=calc(d);

let body=`PURCHASE & SALE AGREEMENT

Property: ${d.address}
Seller:
Buyer: Richardson L. and/or Assigns
Purchase Price: $${Math.round(c.cash)}
Earnest Money Deposit: $500
Inspection Period: 14 days
Closing: 30 days or sooner
Condition: AS-IS

Assignment Clause: Allowed
--------------------------------------
BUYER: Richardson L
SELLER: __________`;

window.location.href=`mailto:${EMAIL}?subject=Offer ${d.address}&body=${encodeURIComponent(body)}`;
}

function contract(d){
let c=calc(d);
let win=window.open("","_blank");
win.document.write(`<pre style="padding:40px">${d.address}

Purchase Price: $${Math.round(c.cash)}

AS-IS | Assignable

Buyer: Richardson L</pre>`);
setTimeout(()=>win.print(),500);
d.status="signed";save();render();
}

function assign(d){
window.open(`mailto:${EMAIL}?subject=Assignment ${d.address}`);
}

function setStatus(i,val){
leads[i].status=val;
if(val==="offer sent"){autoSMS(leads[i]);}
save();render();
}

// ------------------- LINKS -------------------
function openZillow(addr){
window.open(`https://www.zillow.com/homes/${encodeURIComponent(addr)}_rb/`);
}
function openRedfin(addr){
window.open(`https://www.redfin.com/stingray/do/location-autocomplete?location=${encodeURIComponent(addr)}`);
}

// ------------------- CSV -------------------
function uploadCSV(){
let input=document.createElement("input");
input.type="file";
input.accept=".csv";

input.onchange=e=>{
let reader=new FileReader();
reader.onload=function(){
let rows=reader.result.split("\n").slice(1);
leads=rows.map(r=>{
let c=r.split(",");
return{
address:c[0],
arv:+c[1],
repairs:+c[2],
price:+c[3],
status:"lead"
};
});
save();render();
};
reader.readAsText(e.target.files[0]);
};
input.click();
}

// ------------------- RENDER -------------------
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";

leads.forEach((d,i)=>{
let c=calc(d);

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="card-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
${d.address} <span>${d.status}</span>
</div>

<div class="hidden">

Status:
<select onchange="setStatus(${i},this.value)">
<option ${d.status==="lead"?"selected":""}>lead</option>
<option ${d.status==="offer sent"?"selected":""}>offer sent</option>
<option ${d.status==="negotiating"?"selected":""}>negotiating</option>
<option ${d.status==="signed"?"selected":""}>signed</option>
<option ${d.status==="sold"?"selected":""}>sold</option>
</select>

ARV:
<input value="${d.arv}" onchange="leads[${i}].arv=this.value;save();render();">

Price:
<input value="${d.price}" onchange="leads[${i}].price=this.value;save();render();">

Repairs:
<input value="${d.repairs}" onchange="leads[${i}].repairs=this.value;save();render();">

<div class="btn" onclick="autoComp(${i})">📊 Auto Comp</div>

<div class="offerbox">
<b>Offers</b><br>
Cash: $${Math.round(c.cash)}<br>
Creative: $${Math.round(c.creative)}<br>
Seller Finance: $${Math.round(c.sellerFinance)}<br>
<b>Profit:</b> $${Math.round(c.profit)}
</div>

<div class="btn" onclick='openZillow("${d.address}")'>🏡 Zillow</div>
<div class="btn" onclick='openRedfin("${d.address}")'>📍 Redfin</div>

<div class="btn" onclick='sendEmail(leads[${i}])'>📧 Email</div>
<div class="btn" onclick='autoSMS(leads[${i}])'>📱 SMS</div>
<div class="btn" onclick='contract(leads[${i}])'>📄 Contract</div>
<div class="btn" onclick='assign(leads[${i}])'>📑 Assign</div>

<!-- ALL YOUR LINKS KEPT -->
<br><b>PROPERTY INTEL</b>
<a href="https://property.phila.gov" target="_blank">Phila Property</a>
<a href="https://opainquiry.phila.gov" target="_blank">OPA</a>
<a href="https://www.phila.gov/services/property-lots-housing/find-property-information" target="_blank">CityAtlas</a>
<a href="https://pennsylvania.propertychecker.com" target="_blank">PropertyChecker</a>
<a href="https://www.propertyreach.com" target="_blank">PropertyReach</a>

<br><b>RURAL</b>
<a href="https://www.consumerfinance.gov/rural-or-underserved-tool/#rural-or-underserved" target="_blank">CFPB Tool</a>
<a href="https://eligibility.sc.egov.usda.gov/eligibility/welcomeAction.do?pageAction=sfp" target="_blank">USDA</a>

</div>
`;

grid.appendChild(div);
});

updateUI();
}

render();
</script>
